<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lent to Easter Daily Devotional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
        }
        h1, h2, h3, .serif-text {
            font-family: 'Merriweather', serif;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .active-day {
            background-color: #EEF2FF;
            border-left: 4px solid #4F46E5;
            color: #312E81;
            font-weight: 600;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-800 h-screen flex overflow-hidden">

    <!-- Mobile Header -->
    <div class="md:hidden fixed top-0 w-full bg-white shadow-sm z-50 px-4 py-3 flex justify-between items-center border-b border-slate-200">
        <h1 class="text-lg font-bold text-indigo-900 serif-text">Daily Devotional</h1>
        <button id="mobileMenuBtn" class="text-slate-600 focus:outline-none p-2 rounded-md hover:bg-slate-100">
            <i data-lucide="menu"></i>
        </button>
    </div>

    <!-- Sidebar (Navigation) -->
    <aside id="sidebar" class="bg-white border-r border-slate-200 w-full md:w-80 h-full fixed md:relative z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col pt-16 md:pt-0">
        <div class="p-6 border-b border-slate-100 hidden md:block bg-indigo-50 relative overflow-hidden">
            <div class="absolute top-0 right-0 opacity-10 transform translate-x-4 -translate-y-4">

            </div>
            <h1 class="text-2xl font-bold text-indigo-900 serif-text mb-2 relative z-10">Lent to Easter</h1>
            <p class="text-sm text-indigo-700 font-medium relative z-10">Spiritual Journey 2026</p>
        </div>
        <div class="overflow-y-auto flex-1 hide-scrollbar p-3 space-y-1" id="dateList">
            <!-- Date items will be injected here via JS -->
        </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900 bg-opacity-50 z-30 hidden md:hidden transition-opacity"></div>

    <!-- Main Content Area -->
    <main class="flex-1 h-full overflow-y-auto bg-[#FAFAFA] pt-16 md:pt-0 w-full relative scroll-smooth">
        <div class="max-w-3xl mx-auto px-5 py-8 md:py-12 pb-24">
            
            <div id="contentPlaceholder" class="hidden flex-col items-center justify-center h-full text-slate-400 mt-32">

                <p>Select a date to begin your devotional.</p>
            </div>

                <header class="mb-8 text-center border-b border-slate-100 pb-8">
                    <span id="displayDate" class="text-indigo-600 font-bold tracking-wider uppercase text-xs sm:text-sm mb-3 block"></span>
                    <h2 id="displayTitle" class="text-2xl sm:text-3xl md:text-4xl font-bold text-slate-900 serif-text leading-tight text-balance"></h2>
                    
                    <!-- Listen Button -->
                    <div class="flex justify-center mt-6">
                        <button id="listenBtn" onclick="toggleSpeak()" class="flex items-center justify-center gap-2 px-6 py-2.5 bg-indigo-50 text-indigo-700 rounded-full hover:bg-indigo-100 transition-all font-medium text-sm border border-indigo-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1 w-48">
                            <i data-lucide="headphones" class="w-5 h-5"></i>
                            <span>Listen to Devotional</span>
                        </button>
                    </div>
                </header>

                <div class="space-y-10 sm:space-y-12">
                    <!-- Theme Verse -->
                    <section class="relative bg-slate-50 p-6 rounded-xl border border-slate-100">
                        <div class="absolute -left-3 -top-4 text-indigo-200 bg-white rounded-full">
                            <i data-lucide="quote" class="w-10 h-10 fill-current"></i>
                        </div>
                        <h3 class="flex items-center text-xs font-bold text-slate-400 uppercase tracking-widest mb-3" aria-hidden="true">
                            <i data-lucide="book-marked" class="w-4 h-4 mr-2 text-indigo-500"></i> Theme Verse
                        </h3>
                        <blockquote id="displayVerse" class="text-lg sm:text-xl md:text-2xl text-slate-800 italic serif-text leading-relaxed pl-2">
                        </blockquote>
                    </section>

                    <!-- Theology & Insight -->
                    <section>
                        <h3 class="flex items-center text-lg font-bold text-slate-800 border-b border-slate-100 pb-2 mb-4 serif-text" aria-hidden="true">
                            <i data-lucide="lightbulb" class="w-5 h-5 mr-2 text-amber-500"></i> Theology & Insight
                        </h3>
                        <p id="displayTheology" class="text-slate-600 leading-loose text-[1.05rem]"></p>
                    </section>

                    <!-- Heart & Life -->
                    <section>
                        <h3 class="flex items-center text-lg font-bold text-slate-800 border-b border-slate-100 pb-2 mb-4 serif-text" aria-hidden="true">
                            <i data-lucide="heart" class="w-5 h-5 mr-2 text-rose-500"></i> Heart & Life
                        </h3>
                        <p id="displayHeart" class="text-slate-600 leading-loose text-[1.05rem]"></p>
                    </section>

                    <!-- Practical Action -->
                    <section class="bg-indigo-50 p-6 rounded-xl border border-indigo-100 shadow-inner">
                        <h3 class="flex items-center text-lg font-bold text-indigo-900 mb-3 serif-text" aria-hidden="true">
                            <i data-lucide="footprints" class="w-5 h-5 mr-2 text-indigo-600"></i> Practical Action
                        </h3>
                        <p id="displayAction" class="text-indigo-800 leading-relaxed"></p>
                    </section>

                    <!-- Closing Prayer -->
                    <section class="bg-[#F8FAFC] p-6 rounded-xl border border-slate-200 relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-5 transform rotate-12">
                            <i data-lucide="sun" class="w-24 h-24"></i>
                        </div>
                        <h3 class="flex items-center text-lg font-bold text-slate-800 mb-3 serif-text relative z-10" aria-hidden="true">
                            <i data-lucide="hands-praying" class="w-5 h-5 mr-2 text-slate-500"></i> Closing Prayer
                        </h3>
                        <p id="displayPrayer" class="text-slate-600 leading-relaxed italic relative z-10"></p>
                    </section>
                </div>
            </article>

        </div>
    </main>

        // UI Elements
        const dateListEl = document.getElementById('dateList');
        const contentPlaceholder = document.getElementById('contentPlaceholder');
        const devotionalContent = document.getElementById('devotionalContent');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const listenBtn = document.getElementById('listenBtn');

        // Content Display Elements
        const displayDate = document.getElementById('displayDate');
        const displayTitle = document.getElementById('displayTitle');
        const displayVerse = document.getElementById('displayVerse');
        const displayTheology = document.getElementById('displayTheology');
        const displayHeart = document.getElementById('displayHeart');
        const displayAction = document.getElementById('displayAction');
        const displayPrayer = document.getElementById('displayPrayer');

        // State
        let activeDateId = null;
        let currentLoadedDateStr = null;
        
        // Audio State
        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let isPlaying = false;
        let isCancelling = false;

        // Icons Initialization
        lucide.createIcons();

        // Speech Synthesis Logic
        function stopSpeaking() {
            if (synth && synth.speaking) {
                isCancelling = true;
                synth.cancel();
                isPlaying = false;
                updateListenBtnUI();
                // Reset flag slightly after cancel finishes
                setTimeout(() => isCancelling = false, 100);
            }
        }

        function updateListenBtnUI() {
            if (!listenBtn) return;
            if (isPlaying) {
                listenBtn.innerHTML = `<i data-lucide="pause-circle" class="w-5 h-5"></i><span>Pause Reading</span>`;
            } else if (synth && synth.speaking && synth.paused) {
                listenBtn.innerHTML = `<i data-lucide="play-circle" class="w-5 h-5"></i><span>Resume Reading</span>`;
            } else {
                listenBtn.innerHTML = `<i data-lucide="headphones" class="w-5 h-5"></i><span>Listen to Devotional</span>`;
            }
            lucide.createIcons();
        }

        function toggleSpeak() {
            if (!synth) {
                alert("Sorry, your browser does not support text to speech!");
                return;
            }

            // If already speaking but paused, or playing
            if (synth.speaking && !isCancelling) {
                if (synth.paused) {
                    synth.resume();
                    isPlaying = true;
                } else {
                    synth.pause();
                    isPlaying = false;
                }
                updateListenBtnUI();
                return;
            }

            // Start fresh reading
            const devotional = devotionals.find(d => d.date === activeDateId);
            if (!devotional) return;

            // Concatenate ONLY the body text, deliberately skipping the headings. 
            // Using "..." to introduce a slight pause between sections for emotional pacing.
            const textToSpeak = `${devotional.verse} ... ... ${devotional.theology} ... ... ${devotional.heart} ... ... ${devotional.action} ... ... ${devotional.prayer}`;

            currentUtterance = new SpeechSynthesisUtterance(textToSpeak);
            
            // Adjust to sound more reflective/emotional (slightly slower rate)
            currentUtterance.rate = 0.85; 
            currentUtterance.pitch = 1.0; 
            
            // Attempt to find a higher quality English voice
            const voices = synth.getVoices();
            const premiumVoices = voices.filter(v => v.lang.startsWith('en') && (v.name.includes('Premium') || v.name.includes('Google') || v.name.includes('Natural')));
            
            if (premiumVoices.length > 0) {
                currentUtterance.voice = premiumVoices[0];
            } else {
                const enVoices = voices.filter(v => v.lang.startsWith('en'));
                if (enVoices.length > 0) currentUtterance.voice = enVoices[0];
            }

            currentUtterance.onend = () => {
                if (!isCancelling) {
                    isPlaying = false;
                    updateListenBtnUI();
                }
            };

            currentUtterance.onerror = () => {
                if (!isCancelling) {
                    isPlaying = false;
                    updateListenBtnUI();
                }
            };

            synth.speak(currentUtterance);
            isPlaying = true;
            updateListenBtnUI();
        }

        // Time logic: Get current date in America/Vancouver timezone
        function getVancouverDateStr() {
            const now = new Date();
            const options = { timeZone: 'America/Vancouver', year: 'numeric', month: '2-digit', day: '2-digit' };
            const formatter = new Intl.DateTimeFormat('en-CA', options);
            const parts = formatter.formatToParts(now);
            const year = parts.find(p => p.type === 'year').value;
            const month = parts.find(p => p.type === 'month').value;
            const day = parts.find(p => p.type === 'day').value;
            return `${year}-${month}-${day}`;
        }

        // Initialize Sidebar
        function renderSidebar() {
            dateListEl.innerHTML = '';
            devotionals.forEach(devotional => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 rounded-lg text-sm transition-all duration-200 border border-transparent hover:bg-slate-50 focus:outline-none flex flex-col gap-1 ${activeDateId === devotional.date ? 'active-day shadow-sm' : 'text-slate-600'}`;
                btn.id = `btn-${devotional.date}`;
                
                btn.innerHTML = `
                    <span class="font-bold text-xs ${activeDateId === devotional.date ? 'text-indigo-600' : 'text-slate-500'} uppercase tracking-wider">${devotional.displayDate.split(' ')[0]} ${devotional.displayDate.split(' ')[1]}</span>
                    <span class="font-medium truncate block w-full">${devotional.title}</span>
                `;
                
                btn.onclick = () => selectDevotional(devotional.date);
                dateListEl.appendChild(btn);
            });
        }

        // Display Selected Devotional
        function selectDevotional(dateId) {
            // Stop speaking previous devotional if any
            stopSpeaking();
            
            activeDateId = dateId;
            renderSidebar(); // Update active states

            const devotional = devotionals.find(d => d.date === dateId);
            if (!devotional) return;

            // Trigger reflow for animation
            devotionalContent.classList.remove('fade-in');
            void devotionalContent.offsetWidth; 
            devotionalContent.classList.add('fade-in');

            // Set Content
            displayDate.innerText = devotional.displayDate;
            displayTitle.innerText = devotional.title;
            displayVerse.innerText = devotional.verse;
            displayTheology.innerText = devotional.theology;
            displayHeart.innerText = devotional.heart;
            displayAction.innerText = devotional.action;
            displayPrayer.innerText = devotional.prayer;

            // Toggle visibility
            contentPlaceholder.classList.add('hidden');
            devotionalContent.classList.remove('hidden');

            // Close mobile menu if open
            if (window.innerWidth < 768) {
                toggleMobileMenu(false);
            }

            // Scroll to active item in sidebar
            const activeBtn = document.getElementById(`btn-${dateId}`);
            if (activeBtn) {
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            // Scroll main view to top
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Mobile Menu Toggle
        function toggleMobileMenu(show) {
            if (show) {
                sidebar.classList.remove('-translate-x-full');
                sidebarOverlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                sidebarOverlay.classList.add('hidden');
            }
        }

        mobileMenuBtn.addEventListener('click', () => toggleMobileMenu(true));
        sidebarOverlay.addEventListener('click', () => toggleMobileMenu(false));

        // Background checker to update the day automatically if left open across midnight
        function checkMidnightRollover() {
            const newDateStr = getVancouverDateStr();
            // If the date has changed while the tab was open
            if (currentLoadedDateStr && newDateStr !== currentLoadedDateStr) {
                currentLoadedDateStr = newDateStr;
                const newDevotional = devotionals.find(d => d.date === newDateStr);
                // If the new date has a devotional, jump to it automatically
                if (newDevotional) {
                    selectDevotional(newDateStr);
                }
            }
        }

        // Initialization: Find today's date (Vancouver) and load it
        function initApp() {
            // Pre-load voices for SpeechSynthesis (helps Chrome fetch them early)
            if (synth) synth.getVoices();
            
            const todayStr = getVancouverDateStr();
            currentLoadedDateStr = todayStr;
            const todayDevotional = devotionals.find(d => d.date === todayStr);
            
            // If today is within the range, load today. Otherwise load the first item.
            const dateToLoad = todayDevotional ? todayStr : devotionals[0].date;
            
            selectDevotional(dateToLoad);

            // Check every 60 seconds (60000ms) to see if midnight has passed in Vancouver
            setInterval(checkMidnightRollover, 60000);
        }

        // Run App
        initApp();

    </script>
</body>
</html>
